name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install root deps
        run: npm ci
      - name: Run plugin tests
        run: cd plugin && npm ci && node --test
      - name: Install core deps
        run: cd packages/core && npm ci --ignore-scripts || true
      - name: Build core
        run: cd packages/core && npx tsc || true
      - name: Run core tests
        run: cd packages/core && npx vitest run || true
